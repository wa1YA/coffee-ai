<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咖啡大师 — RAG + Agent 智能问答助手</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #666;
    --border: #e0e0e0;
    --accent: #6f4e37;
    --accent-light: #f5ede6;
    --success: #16a34a;
    --warn: #ea580c;
    --danger: #dc2626;
    --rag: #7c3aed;
    --agent: #0891b2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 960px;
    height: 95vh;
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .badge-row { display: flex; gap: 8px; }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
  }
  .badge-rag { background: #f3e8ff; color: var(--rag); }
  .badge-agent { background: #e0f2fe; color: var(--agent); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 85%;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .msg .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #f3f4f6; border-bottom-left-radius: 4px; }

  .msg .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .msg.user .meta { justify-content: flex-end; }

  .tag {
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 99px;
    background: #e5e7eb;
    font-weight: 600;
  }
  .tag-intent { background: #dbeafe; color: #1d4ed8; }
  .tag-mode { background: #fef3c7; color: #b45309; }
  .tag-score { background: #dcfce7; color: #15803d; }
  .tag-blocked { background: #fee2e2; color: var(--danger); }

  /* Retrieved docs */
  .retrieved-box {
    margin-top: 8px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 12px;
  }
  .retrieved-box summary {
    padding: 6px 12px;
    cursor: pointer;
    background: #fafafa;
    font-weight: 600;
    color: var(--muted);
  }
  .retrieved-doc {
    padding: 8px 12px;
    border-top: 1px solid #f0f0f0;
  }
  .retrieved-doc .doc-title { font-weight: 600; color: var(--rag); }
  .retrieved-doc .doc-score { color: var(--muted); margin-left: 6px; }
  .retrieved-doc .doc-preview { color: #555; margin-top: 2px; }

  /* Input */
  .input-area {
    padding: 12px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .input-wrap {
    position: relative;
    width: 100%;
    max-width: 600px;
  }
  .input-wrap textarea {
    width: 100%;
    padding: 14px 52px 14px 22px;
    border: none;
    border-radius: 28px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    line-height: 1.4;
    background: rgba(0,0,0,.04);
    color: var(--text);
    transition: background .2s, box-shadow .2s;
    min-height: 52px;
    max-height: 180px;
  }
  .input-wrap textarea:focus {
    background: rgba(0,0,0,.06);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .input-wrap textarea:disabled {
    opacity: .6;
  }
  .input-wrap textarea::placeholder {
    color: rgba(0,0,0,.45);
  }
  .input-area input:focus { border-color: var(--accent); }
  .input-wrap .send-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
    color: var(--text);
  }
  .input-wrap .send-btn:hover:not(:disabled) { background: rgba(0,0,0,.08); }
  .input-wrap .send-btn:disabled { cursor: default; opacity: .3; }
  .input-wrap .send-btn.has-text { background: rgba(0,0,0,.06); }

  .spinner-square {
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 3px;
    animation: spin3d 3s linear infinite;
  }
  @keyframes spin3d {
    0%   { transform: perspective(40px) rotateY(0deg); }
    100% { transform: perspective(40px) rotateY(360deg); }
  }
  .status-line {
    font-size: 11px;
    color: var(--muted);
    height: 14px;
    padding-left: 22px;
    align-self: flex-start;
  }

  .quick-asks {
    padding: 0 24px 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .quick-asks button {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
  }
  .quick-asks button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .header-user { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .logout-btn {
    font-size: 12px; background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 10px; cursor: pointer; color: var(--muted);
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1> 咖啡大师 · Coffee AI</h1>
    <div class="badge-row">
      <span class="badge badge-rag">RAG 检索增强</span>
      <span class="badge badge-agent">Agent 意图路由</span>
      <span class="header-user" id="headerUser"></span>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg assistant">
      <div class="bubble"> 欢迎来到咖啡大师！我是基于RAG+Agent架构的咖啡智能助手 <br><br>
        &bull; <b>RAG检索增强</b> — 知识库涵盖咖啡豆品种、处理法、烘焙、冲煮器具、品鉴文化<br>
        &bull; <b>Agent意图路由</b> — 自动识别你的问题类型，精准路由到对应知识<br>
        &bull; <b>LLM智能生成</b> — 基于检索结果由DeepSeek生成专业回答<br>
        &bull; <b>安全防护</b> — 危险操作自动拦截<br><br>
        试着问我："阿拉比卡和罗布斯塔有什么区别"、"手冲咖啡怎么冲"、"日晒和水洗怎么选"</div>
      <div class="meta"><span class="tag tag-mode">系统</span></div>
    </div>
  </div>

  <div class="quick-asks" id="quickAsks">
    <button data-q="阿拉比卡和罗布斯塔咖啡豆有什么区别？"> 咖啡豆品种</button>
    <button data-q="日晒和水洗处理法有什么不同？风味特点是什么？"> 处理法对比</button>
    <button data-q="手冲咖啡的正确冲煮方法是什么？水温粉水比怎么控制？"> 手冲手法</button>
    <button data-q="咖啡烘焙的浅烘、中烘、深烘各有什么特点？"> 烘焙程度</button>
    <button data-q="意式浓缩的标准萃取参数是什么？什么是好的Crema？"> 意式浓缩</button>
    <button data-q="SCA杯测怎么评分？咖啡风味轮是什么？"> 品鉴评分</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inputBox" placeholder="输入你的问题..." rows="1" autofocus></textarea>
      <button id="sendBtn" class="send-btn">
        <svg id="sendIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        <div id="sendSpinner" class="spinner-square" style="display:none"></div>
      </button>
    </div>
    <div class="status-line" id="statusLine">Ready to submit!</div>
  </div>
</div>

<script>
// ===== 用户信息 =====
const headerUser = document.getElementById('headerUser');
let currentUser = '';

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

(async function loadUser() {
  try {
    const resp = await fetch('/api/me');
    const data = await resp.json();
    if (data.username) {
      currentUser = data.username;
      headerUser.innerHTML = '👤 ' + esc(currentUser)
        + ' <button class="logout-btn" onclick="logout()">退出</button>';
    }
  } catch (_) {}
})();

// ===== Chat =====
const chatArea = document.getElementById('chatArea');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');
const sendIcon = document.getElementById('sendIcon');
const sendSpinner = document.getElementById('sendSpinner');
const statusLine = document.getElementById('statusLine');

// ===== 自动撑高 textarea =====
function autoResize() {
  inputBox.style.height = '52px';
  const newH = Math.min(inputBox.scrollHeight, 180);
  inputBox.style.height = newH + 'px';
}

inputBox.addEventListener('input', () => {
  autoResize();
  const has = inputBox.value.trim().length > 0;
  sendBtn.classList.toggle('has-text', has);
});

// ===== 按钮状态 =====
function setLoading(loading) {
  sendBtn.disabled = loading || !inputBox.value.trim();
  sendIcon.style.display = loading ? 'none' : 'block';
  sendSpinner.style.display = loading ? 'block' : 'none';
  inputBox.disabled = loading;
  statusLine.textContent = loading ? 'AI is thinking...' : 'Ready to submit!';
}

function updateBtn() {
  sendBtn.disabled = !inputBox.value.trim();
}

inputBox.addEventListener('input', updateBtn);

function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    meta.forEach(m => {
      const span = document.createElement('span');
      span.className = 'tag ' + (m.cls || '');
      span.textContent = m.label;
      metaDiv.appendChild(span);
    });
    div.appendChild(metaDiv);
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addRetrieved(retrieved) {
  if (!retrieved || !retrieved.length) return;
  const details = document.createElement('details');
  details.className = 'retrieved-box';
  let html = '<summary> 检索结果 (' + retrieved.length + '条)</summary>';
  retrieved.forEach(doc => {
    html += `<div class="retrieved-doc">
      <span class="doc-title">${esc(doc.title)}</span>
      <span class="doc-score">相关度: ${(doc.score*100).toFixed(0)}%</span>
      <div class="doc-preview">${esc(doc.preview || '')}</div>
    </div>`;
  });
  details.innerHTML = html;
  chatArea.lastElementChild.appendChild(details);
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

async function send(msg) {
  const text = msg || inputBox.value.trim();
  if (!text || sendBtn.disabled) return;

  addMsg('user', esc(text));
  inputBox.value = '';
  autoResize();
  setLoading(true);
  sendBtn.classList.remove('has-text');

  const meta = [];

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, user_id: currentUser || 'anonymous' }),
    });
    const data = await resp.json();

    meta.push({ label: data.mode || 'unknown', cls: 'tag-mode' });
    if (data.intent && data.intent !== 'chat') {
      meta.push({ label: data.intent, cls: data.intent === 'blocked' ? 'tag-blocked' : 'tag-intent' });
    }
    if (data.confidence > 0) {
      meta.push({ label: '置信度' + (data.confidence*100).toFixed(0) + '%', cls: 'tag-score' });
    }

    addMsg('assistant', esc(data.reply), meta);
    addRetrieved(data.retrieved);

  } catch (err) {
    addMsg('assistant', '请求失败: ' + esc(err.message), [{ label: '错误', cls: 'tag-blocked' }]);
  }

  setLoading(false);
  updateBtn();
  inputBox.focus();
}

sendBtn.addEventListener('click', () => send());
inputBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

document.getElementById('quickAsks').addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') send(e.target.dataset.q);
});
</script>
</body>
</html>
