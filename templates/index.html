<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咖啡大叔 · RPG对话交互</title>
<style>
  :root {
    /* 匹配大胡子卡通图蓝色主色调 */
    --blue-main: #439AE2;
    --blue-light: #91CCF4;
    --blue-dark: #284F81;
    --paper-bg: #F7FBFF;
    --stroke-black: #121212;
    --npc-tag: #FFD379;
    --user-tag: #439AE2;
    --warn-red: #FF7979;
    --success-green: #8AE1B1;
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  body {
    background-color: var(--blue-light);
    /* RPG点阵背景纹理 */
    background-image: radial-gradient(#ffffff66 2px, transparent 2px);
    background-size: 22px 22px;
    min-height: 100vh;
    padding: 16px 12px;
  }
  .rpg-game-box {
    max-width: 750px;
    margin: 0 auto;
  }

  /* 顶部游戏标题栏 */
  .rpg-title-bar {
    background: linear-gradient(var(--blue-main), var(--blue-dark));
    border: 4px solid var(--stroke-black);
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 6px 0 var(--stroke-black);
  }
  .rpg-title-bar h1 {
    color: white;
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  }
  .skill-label-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .skill-label {
    background: var(--paper-bg);
    border: 2px solid var(--stroke-black);
    padding: 3px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    box-shadow: 2px 2px 0 #000;
  }

  /* RPG NPC角色立绘区域 */
  .npc-portrait-wrap {
    text-align: center;
    margin-bottom: 22px;
  }
  .npc-frame {
    display: inline-block;
    border: 5px solid var(--stroke-black);
    border-radius: 24px;
    background: #fff;
    padding: 6px;
    box-shadow: 6px 6px 0 var(--stroke-black);
  }
  .npc-frame img {
    width: 250px;
    height: 250px;
    object-fit: contain;
    border-radius: 18px;
    display: block;
  }
  .npc-name-tag {
    margin-top: -10px;
    position: relative;
    background: var(--blue-main);
    color: #fff;
    border: 3px solid var(--stroke-black);
    padding: 5px 22px;
    border-radius: 99px;
    font-weight: bold;
    font-size: 15px;
    box-shadow: 3px 3px 0 #000;
  }

  /* RPG对话主窗口 */
  .rpg-dialog-window {
    background: var(--paper-bg);
    border: 4px solid var(--stroke-black);
    border-radius: 18px;
    padding: 18px;
    min-height: 350px;
    max-height: 43vh;
    overflow-y: auto;
    margin-bottom: 18px;
    box-shadow: 0 5px 0 var(--stroke-black);
  }
  .rpg-dialog-window::-webkit-scrollbar {
    width: 7px;
  }
  .rpg-dialog-window::-webkit-scrollbar-thumb {
    background: var(--blue-main);
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  /* 对话气泡 RPG漫画风格 */
  .talk-msg {
    margin: 16px 0;
    max-width: 87%;
    clear: both;
  }
  .talk-msg.user {
    float: right;
  }
  .talk-msg.npc {
    float: left;
  }
  .talk-bubble {
    padding: 14px 18px;
    border: 3px solid var(--stroke-black);
    border-radius: 20px;
    line-height: 1.65;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
  }
  .talk-msg.user .talk-bubble {
    background: var(--blue-main);
    color: white;
    border-bottom-right-radius: 5px;
  }
  .talk-msg.npc .talk-bubble {
    background: #ffffff;
    color: #111;
    border-bottom-left-radius: 5px;
  }
  .msg-tag-row {
    margin-top: 8px;
  }
  .talk-msg.user .msg-tag-row {
    text-align: right;
  }
  .tag {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 99px;
    border: 1px solid #000;
    margin: 0 4px;
  }
  .tag-mode { background: var(--blue-light); }
  .tag-intent { background: var(--success-green); }
  .tag-score { background: var(--npc-tag); }
  .tag-blocked { background: var(--warn-red); color: #fff; }

  /* RAG知识库道具面板（RPG古籍） */
  .knowledge-book-panel {
    margin-top: 10px;
    border: 2px dashed var(--blue-dark);
    border-radius: 12px;
    padding: 10px;
    background: #EFF8FF;
  }
  .knowledge-book-panel summary {
    cursor: pointer;
    font-weight: bold;
    color: var(--blue-dark);
    font-size: 13px;
  }
  .book-item {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(0,0,0,0.1);
  }
  .book-title { font-weight: bold; color: #90552C; }
  .book-match-rate { font-size: 11px; color: #444; margin-left: 6px; }
  .book-content { font-size: 12px; color: #333; margin-top: 4px; }

  /* 快捷对话选项 游戏支线任务按钮 */
  .quick-quest-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .quick-quest-buttons button {
    background: #fff;
    border: 3px solid var(--stroke-black);
    border-radius: 99px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    transition: all 0.12s ease;
  }
  .quick-quest-buttons button:hover {
    background: var(--blue-main);
    color: white;
  }
  .quick-quest-buttons button:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
  }

  /* 底部RPG输入操作台 */
  .rpg-input-bar {
    display: flex;
    gap: 12px;
    background: #fff;
    border: 4px solid var(--stroke-black);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 5px 0 var(--stroke-black);
  }
  .rpg-input-bar input {
    flex: 1;
    border: 3px solid var(--blue-dark);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 14px;
    outline: none;
    background: var(--paper-bg);
  }
  .rpg-input-bar input:focus {
    border-color: var(--blue-main);
    box-shadow: 0 0 0 3px var(--blue-light);
  }
  .send-talk-btn {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    border: 3px solid var(--stroke-black);
    background: var(--blue-main);
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    transition: all 0.12s;
  }
  .send-talk-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
  }
  .send-talk-btn:disabled {
    background: #AAAAAA;
    transform: none;
    box-shadow: none;
    cursor: default;
  }

  /* 移动端适配 */
  @media (max-width: 540px) {
    .npc-frame img { width: 200px; height: 200px; }
    .rpg-input-bar { flex-direction: column; }
    .send-talk-btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="rpg-game-box">
  <!-- 游戏顶部标题 -->
  <div class="rpg-title-bar">
    <h1>☕ 咖啡大叔 · RPG角色对话</h1>
    <div class="skill-label-group">
      <span class="skill-label">📖 RAG知识库检索</span>
      <span class="skill-label">🧠 Agent意图识别</span>
    </div>
  </div>

  <!-- NPC大胡子咖啡大叔立绘 -->
  <div class="npc-portrait-wrap">
    <div class="npc-frame">
      <img src="/static/character.png" alt="咖啡大叔NPC">
    </div>
    <div class="npc-name-tag">NPC · 老马（咖啡店主）</div>
  </div>

  <!-- RPG对话窗口 -->
  <div class="rpg-dialog-window" id="chatArea">
    <div class="talk-msg npc">
      <div class="talk-bubble">
        哈喽，冒险者！我是老马，开了几十年咖啡店的大胡子店主。<br><br>
        不管是咖啡豆品种、烘焙火候、手冲、意式萃取，所有咖啡知识我都懂。
        我身后藏着完整咖啡古籍知识库（RAG检索），能精准解答你的所有问题。
        Agent会自动分辨你想问的方向，不会答非所问。<br><br>
        有什么咖啡问题尽管和我说吧！
      </div>
      <div class="msg-tag-row"><span class="tag tag-mode">NPC老马</span></div>
    </div>
  </div>

  <!-- 快捷对话选项 -->
  <div class="quick-quest-buttons" id="quickAsks">
    <button data-q="阿拉比卡和罗布斯塔咖啡豆有什么区别？">☕ 咖啡豆品种</button>
    <button data-q="日晒和水洗处理法有什么不同？风味特点是什么？">🌿 生豆处理方式</button>
    <button data-q="手冲咖啡的正确冲煮方法是什么？水温粉水比怎么控制？">🫖 手冲完整教程</button>
    <button data-q="咖啡烘焙的浅烘、中烘、深烘各有什么特点？">🔥 烘焙程度讲解</button>
    <button data-q="意式浓缩的标准萃取参数是什么？什么是好的Crema？">🍵 意式浓缩知识</button>
    <button data-q="SCA杯测怎么评分？咖啡风味轮是什么？">📊 专业咖啡品鉴</button>
  </div>

  <!-- 底部输入框，和NPC对话提问 -->
  <div class="rpg-input-bar">
    <input type="text" id="inputBox" placeholder="输入问题，和咖啡大叔对话..." autofocus>
    <button class="send-talk-btn" id="sendBtn">↑</button>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');

// 渲染对话消息
function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = 'talk-msg ' + role;
  div.innerHTML = `<div class="talk-bubble">${text}</div>`;
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'msg-tag-row';
    meta.forEach(m => {
      const span = document.createElement('span');
      span.className = 'tag ' + (m.cls || '');
      span.textContent = m.label;
      metaDiv.appendChild(span);
    });
    div.appendChild(metaDiv);
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// RAG知识库展示（游戏古籍书本）
function addRetrieved(retrieved) {
  if (!retrieved || !retrieved.length) return;
  const details = document.createElement('details');
  details.className = 'knowledge-book-panel';
  let html = '<summary>📚 老马翻阅咖啡古籍 (' + retrieved.length + '份资料)</summary>';
  retrieved.forEach(doc => {
    html += `<div class="book-item">
      <span class="book-title">${esc(doc.title)}</span>
      <span class="book-match-rate">匹配度: ${(doc.score*100).toFixed(0)}%</span>
      <div class="book-content">${esc(doc.preview || '')}</div>
    </div>`;
  });
  details.innerHTML = html;
  chatArea.lastElementChild.appendChild(details);
}

// 文本转义防止HTML注入
function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// 发送提问（原有接口逻辑完全保留，无修改）
async function send(msg) {
  const text = msg || inputBox.value.trim();
  if (!text) return;

  addMsg('user', esc(text));
  inputBox.value = '';
  sendBtn.disabled = true;

  const meta = [];

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, user_id: 'demo' }),
    });
    const data = await resp.json();

    meta.push({ label: data.mode || '古籍检索', cls: 'tag-mode' });
    if (data.intent && data.intent !== 'chat') {
      meta.push({ label: data.intent, cls: data.intent === 'blocked' ? 'tag-blocked' : 'tag-intent' });
    }
    if (data.confidence > 0) {
      meta.push({ label: '匹配度' + (data.confidence*100).toFixed(0) + '%', cls: 'tag-score' });
    }

    addMsg('npc', esc(data.reply), meta);
    addRetrieved(data.retrieved);

  } catch (err) {
    addMsg('npc', '哎呀，我的咖啡机出故障了，暂时没法回答你：' + esc(err.message), [{ label: '对话错误', cls: 'tag-blocked' }]);
  }

  sendBtn.disabled = false;
  inputBox.focus();
}

// 绑定交互事件
sendBtn.addEventListener('click', () => send());
inputBox.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

document.getElementById('quickAsks').addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') send(e.target.dataset.q);
});
</script>
</body>
</html>
