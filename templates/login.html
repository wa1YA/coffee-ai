<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 咖啡大师 Coffee AI</title>
<style>
  :root {
    --bg: #F8F5FF;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #8B7FAA;
    --border: #DDD6E8;
    --accent: #6C3FF5;
    --accent-light: #8B6FF5;
    --accent-shadow: rgba(108,63,245,.12);
    --danger: #DC2626;
    --purple: #6C3FF5;
    --black: #2D2D2D;
    --orange: #FF9B6B;
    --yellow: #E8D754;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    background: var(--bg);
  }

  /* ============ 左侧角色区 ============ */
  .mascot-area {
    flex: 1 1 50%;
    background: linear-gradient(180deg, #5E35D0 0%, #6C3FF5 20%, #5A3DD5 60%, #4527A0 100%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding-bottom: 40px;
  }
  .mascot-area::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: rgba(0,0,0,.08);
    border-radius: 60% 60% 0 0 / 100% 100% 0 0;
  }
  /* 装饰 */
  .mascot-area .deco-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }
  .mascot-area .deco-blob1 {
    position: absolute;
    top: 20%; right: 20%;
    width: 200px; height: 200px;
    background: rgba(255,255,255,.08);
    border-radius: 50%;
    filter: blur(60px);
  }
  .mascot-area .deco-blob2 {
    position: absolute;
    bottom: 30%; left: 20%;
    width: 280px; height: 280px;
    background: rgba(255,255,255,.04);
    border-radius: 50%;
    filter: blur(80px);
  }
  .mascot-area .logo-text {
    position: absolute;
    top: 40px; left: 50px;
    color: rgba(255,255,255,.9);
    font-size: 18px;
    font-weight: 700;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mascot-area .logo-text .icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .mascot-area .footer-links {
    position: absolute;
    bottom: 50px; left: 50px;
    z-index: 10;
    display: flex;
    gap: 24px;
  }
  .mascot-area .footer-links a {
    color: rgba(255,255,255,.5);
    font-size: 12px;
    text-decoration: none;
    transition: color .2s;
  }
  .mascot-area .footer-links a:hover { color: rgba(255,255,255,.8); }

  /* 角色容器 */
  .characters {
    position: relative;
    width: 550px;
    height: 420px;
    z-index: 5;
  }

  /* 角色公共 */
  .char {
    position: absolute;
    bottom: 0;
    transition: transform .6s cubic-bezier(.34,1.56,.64,1), height .5s ease;
  }
  .char .eyes {
    position: absolute;
    display: flex;
    transition: all .5s cubic-bezier(.34,1.56,.64,1);
    z-index: 3;
  }

  /* 眼球 + 瞳孔 */
  .eyeball {
    border-radius: 50%;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pupil {
    border-radius: 50%;
    background: #2D2D2D;
    transition: transform .1s ease-out;
  }

  /* ===== 紫色矩形角色 - 后层 ===== */
  .char-purple {
    left: 70px;
    width: 180px;
    height: 400px;
    background: var(--purple);
    border-radius: 10px 10px 0 0;
    z-index: 1;
    transform-origin: bottom center;
  }
  .char-purple .eyes {
    top: 40px;
    left: 45px;
    gap: 20px;
  }
  .char-purple .eyeball {
    width: 18px; height: 18px;
  }
  .char-purple .pupil {
    width: 7px; height: 7px;
  }

  /* ===== 黑色矩形角色 - 中层 ===== */
  .char-black {
    left: 240px;
    width: 120px;
    height: 310px;
    background: var(--black);
    border-radius: 8px 8px 0 0;
    z-index: 2;
    transform-origin: bottom center;
  }
  .char-black .eyes {
    top: 32px;
    left: 26px;
    gap: 16px;
  }
  .char-black .eyeball {
    width: 16px; height: 16px;
  }
  .char-black .pupil {
    width: 6px; height: 6px;
  }

  /* ===== 橙色半圆角色 - 前左 ===== */
  .char-orange {
    left: 0px;
    width: 240px;
    height: 200px;
    background: var(--orange);
    border-radius: 120px 120px 0 0;
    z-index: 3;
    transform-origin: bottom center;
  }
  .char-orange .eyes {
    top: 90px;
    left: 82px;
    gap: 24px;
  }
  .char-orange .pupil {
    width: 12px; height: 12px;
    background: #2D2D2D;
  }

  /* ===== 黄色半圆角色 - 前右 ===== */
  .char-yellow {
    left: 310px;
    width: 140px;
    height: 230px;
    background: var(--yellow);
    border-radius: 70px 70px 0 0;
    z-index: 4;
    transform-origin: bottom center;
  }
  .char-yellow .eyes {
    top: 40px;
    left: 52px;
    gap: 18px;
  }
  .char-yellow .pupil {
    width: 12px; height: 12px;
    background: #2D2D2D;
  }
  .char-yellow .mouth {
    position: absolute;
    top: 88px;
    left: 40px;
    width: 80px;
    height: 4px;
    background: #2D2D2D;
    border-radius: 2px;
    transition: all .2s ease;
  }

  /* 眨眼 */
  .blinking .eyeball {
    height: 2px !important;
    transition: height .08s ease;
  }
  .blinking .pupil { display: none; }

  /* 紫色伸长偷看密码 */
  .char-purple.peeking { height: 440px; }
  .char-purple.peeking .eyes { top: 35px; left: 20px; }

  /* 打字时互相看 */
  .looking-each .char-purple .eyes { left: 55px; top: 65px; }
  .looking-each .char-black .eyes { left: 32px; top: 12px; }
  .looking-each .char-purple { height: 440px; }

  /* 密码可见时恢复 */
  .pwd-visible .char-purple { height: 400px; transform: skewX(0deg) !important; }
  .pwd-visible .char-purple .eyes { left: 20px; top: 35px; }
  .pwd-visible .char-black { transform: skewX(0deg) !important; }
  .pwd-visible .char-black .eyes { left: 10px; top: 28px; }
  .pwd-visible .char-orange { transform: skewX(0deg) !important; }
  .pwd-visible .char-orange .eyes { left: 50px; top: 85px; }
  .pwd-visible .char-yellow { transform: skewX(0deg) !important; }
  .pwd-visible .char-yellow .eyes { left: 20px; top: 35px; }
  .pwd-visible .char-yellow .mouth { left: 10px; top: 88px; }

  /* 提交中 */
  .submitting .char-purple .eyeball { animation: fastBlink .12s ease 3; }
  .submitting .char-black .eyeball { animation: fastBlink .12s ease 3 .05s; }
  @keyframes fastBlink {
    0%, 100% { height: auto; }
    50% { height: 2px; }
  }

  /* 入场动画覆盖 */
  .char-purple { animation: slideUp .6s cubic-bezier(.22,.61,.36,1) both; }
  .char-black  { animation: slideUp .6s cubic-bezier(.22,.61,.36,1) .1s both; }
  .char-orange  { animation: slideUp .6s cubic-bezier(.22,.61,.36,1) .15s both; }
  .char-yellow  { animation: slideUp .6s cubic-bezier(.22,.61,.36,1) .2s both; }
  @keyframes slideUp {
    0% { transform: translateY(300px) scale(.5); opacity: 0; }
    60% { transform: translateY(-15px) scale(1.05); opacity: 1; }
    80% { transform: translateY(5px) scale(.97); }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* 错误摇晃 */
  .shake { animation: shake .5s ease !important; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    15% { transform: translateX(-10px) rotate(-6deg); }
    35% { transform: translateX(10px) rotate(6deg); }
    55% { transform: translateX(-7px) rotate(-4deg); }
    75% { transform: translateX(7px) rotate(4deg); }
  }

  /* ============ 右侧表单 ============ */
  .form-area {
    flex: 1 1 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card);
    box-shadow: -4px 0 40px rgba(0,0,0,.06);
    z-index: 2;
    padding: 50px 60px;
  }
  .form-card {
    width: 100%;
    max-width: 420px;
  }
  .form-card .mobile-logo {
    display: none;
    text-align: center;
    font-size: 40px;
    margin-bottom: 8px;
  }
  .form-card h2 {
    font-size: 28px;
    text-align: center;
    color: var(--text);
    font-weight: 800;
    margin-bottom: 6px;
  }
  .form-card .subtitle {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    background: #FAFAFA;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-shadow);
    background: #fff;
  }
  .form-group input.error {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(220,38,38,.1);
    animation: shakeInput .4s ease;
  }
  @keyframes shakeInput {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-3px); }
  }
  .field-error {
    font-size: 12px;
    color: var(--danger);
    margin-top: 4px;
    min-height: 18px;
  }
  .pwd-wrap {
    position: relative;
  }
  .pwd-wrap .toggle-pwd {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 4px;
    line-height: 1;
  }
  .pwd-wrap .toggle-pwd:hover { color: var(--text); }

  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, #8B6FF5 100%);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    margin-top: 10px;
    letter-spacing: 2px;
  }
  .submit-btn:hover { opacity: .9; }
  .submit-btn:active { transform: scale(.98); }
  .submit-btn:disabled { opacity: .5; cursor: default; transform: none; }

  .switch-row {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--muted);
  }
  .switch-row button {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
    text-decoration: underline;
  }
  .switch-row button:hover { opacity: .7; }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.12);
    z-index: 99;
    animation: toastIn .3s ease;
    font-weight: 600;
  }
  .toast.error  { border: 1px solid var(--danger); color: var(--danger); }
  .toast.success { border: 1px solid #16a34a; color: #16a34a; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width: 800px) {
    body { flex-direction: column; }
    .mascot-area { flex: 0 0 140px; padding-bottom: 20px; }
    .mascot-area::after { height: 20px; }
    .mascot-area .logo-text,
    .mascot-area .footer-links { display: none; }
    .characters { transform: scale(.35); transform-origin: bottom center; }
    .form-area { flex: 1; padding: 24px 24px; }
    .form-card .mobile-logo { display: block; }
  }
</style>
</head>
<body>

<!-- ==================== 左侧角色区 ==================== -->
<div class="mascot-area" id="mascotArea">
  <div class="deco-dots"></div>
  <div class="deco-blob1"></div>
  <div class="deco-blob2"></div>
  <div class="logo-text">
    <span class="icon">☕</span>
    咖啡大师
  </div>

  <div class="characters" id="charsContainer">
    <!-- 紫色高矩形 - 后层 -->
    <div class="char char-purple" id="charPurple">
      <div class="eyes" id="purpleEyes">
        <div class="eyeball"><div class="pupil"></div></div>
        <div class="eyeball"><div class="pupil"></div></div>
      </div>
    </div>

    <!-- 黑色矩形 - 中层 -->
    <div class="char char-black" id="charBlack">
      <div class="eyes" id="blackEyes">
        <div class="eyeball"><div class="pupil"></div></div>
        <div class="eyeball"><div class="pupil"></div></div>
      </div>
    </div>

    <!-- 橙色半圆 - 前左 -->
    <div class="char char-orange" id="charOrange">
      <div class="eyes" id="orangeEyes">
        <div class="pupil" style="width:12px;height:12px;"></div>
        <div class="pupil" style="width:12px;height:12px;"></div>
      </div>
    </div>

    <!-- 黄色半圆 - 前右 -->
    <div class="char char-yellow" id="charYellow">
      <div class="eyes" id="yellowEyes">
        <div class="pupil" style="width:12px;height:12px;"></div>
        <div class="pupil" style="width:12px;height:12px;"></div>
      </div>
      <div class="mouth" id="yellowMouth"></div>
    </div>
  </div>

  <div class="footer-links">
    <a href="#">隐私政策</a>
    <a href="#">服务条款</a>
    <a href="#">联系我们</a>
  </div>
</div>

<!-- ==================== 右侧表单 ==================== -->
<div class="form-area">
  <div class="form-card">
    <div class="mobile-logo">☕</div>
    <h2 id="formTitle">欢迎回来</h2>
    <p class="subtitle" id="formSubtitle">登录你的咖啡大师账号</p>

    <form id="authForm" autocomplete="off" novalidate>
      <div class="form-group" id="loginField">
        <label for="loginInput">用户名 / 邮箱</label>
        <input type="text" id="loginInput" placeholder="输入用户名或邮箱" autocomplete="username">
        <div class="field-error" id="loginError"></div>
      </div>

      <div class="form-group" id="regUserGroup" style="display:none">
        <label for="usernameInput">用户名</label>
        <input type="text" id="usernameInput" placeholder="2-20个字符" maxlength="20" autocomplete="off">
        <div class="field-error" id="usernameError"></div>
      </div>

      <div class="form-group" id="regEmailGroup" style="display:none">
        <label for="emailInput">邮箱</label>
        <input type="email" id="emailInput" placeholder="请输入邮箱地址" autocomplete="email">
        <div class="field-error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="passwordInput">密码</label>
        <div class="pwd-wrap">
          <input type="password" id="passwordInput" placeholder="至少4个字符" autocomplete="current-password">
          <button type="button" class="toggle-pwd" id="togglePwd" title="显示密码">👁</button>
        </div>
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="form-group" id="confirmGroup" style="display:none">
        <label for="confirmInput">确认密码</label>
        <input type="password" id="confirmInput" placeholder="再次输入密码" autocomplete="off">
        <div class="field-error" id="confirmError"></div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">登 录</button>
    </form>

    <div class="switch-row">
      <span id="switchText">还没有账号？</span>
      <button id="switchBtn" type="button">立即注册</button>
    </div>
  </div>
</div>

<script>
// ===== 元素引用 =====
const mascotArea = document.getElementById('mascotArea');
const charPurple = document.getElementById('charPurple');
const charBlack = document.getElementById('charBlack');
const charOrange = document.getElementById('charOrange');
const charYellow = document.getElementById('charYellow');
const purpleEyes = document.getElementById('purpleEyes');
const blackEyes = document.getElementById('blackEyes');
const orangeEyes = document.getElementById('orangeEyes');
const yellowEyes = document.getElementById('yellowEyes');
const yellowMouth = document.getElementById('yellowMouth');
const charsContainer = document.getElementById('charsContainer');

const loginInput = document.getElementById('loginInput');
const usernameInput = document.getElementById('usernameInput');
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const confirmInput = document.getElementById('confirmInput');
const togglePwd = document.getElementById('togglePwd');
const submitBtn = document.getElementById('submitBtn');
const formTitle = document.getElementById('formTitle');
const formSubtitle = document.getElementById('formSubtitle');
const switchBtn = document.getElementById('switchBtn');
const switchText = document.getElementById('switchText');
const loginField = document.getElementById('loginField');
const regUserGroup = document.getElementById('regUserGroup');
const regEmailGroup = document.getElementById('regEmailGroup');
const confirmGroup = document.getElementById('confirmGroup');

let mode = 'login';
let mouseX = 0, mouseY = 0;
let showPassword = false;
let isTyping = false;
let typingTimer = null;
let purpleBlinking = false;
let blackBlinking = false;
let isLookingAtEachOther = false;
let isPurplePeeking = false;
let peekTimer = null;

// ===== 鼠标跟踪 =====
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// ===== 计算瞳孔位置 =====
function calcPupil(container, pupilEl, maxDist) {
  const cr = container.getBoundingClientRect();
  const cx = cr.left + cr.width / 2;
  const cy = cr.top + cr.height / 2;
  const dx = mouseX - cx;
  const dy = mouseY - cy;
  const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxDist);
  const angle = Math.atan2(dy, dx);
  const tx = Math.cos(angle) * dist;
  const ty = Math.sin(angle) * dist;
  pupilEl.style.transform = `translate(${tx}px, ${ty}px)`;
}

// ===== 瞳孔动画循环 =====
function animatePupils() {
  if (isLookingAtEachOther || (passwordInput.value && showPassword)) {
    // 用强制方向，跳过鼠标跟踪
  } else {
    charPurple.querySelectorAll('.pupil').forEach(p => calcPupil(charPurple, p, 5));
    charBlack.querySelectorAll('.pupil').forEach(p => calcPupil(charBlack, p, 4));
    charOrange.querySelectorAll('.pupil').forEach(p => calcPupil(charOrange, p, 5));
    charYellow.querySelectorAll('.pupil').forEach(p => calcPupil(charYellow, p, 5));
  }
  requestAnimationFrame(animatePupils);
}
animatePupils();

// ===== 身体倾斜跟随鼠标 =====
function animateBodyLean() {
  if (showPassword && passwordInput.value) return requestAnimationFrame(animateBodyLean);

  const cr = charsContainer.getBoundingClientRect();
  const cy = cr.top + cr.height / 3;
  const dx = mouseX - (cr.left + cr.width / 2);
  const dy = mouseY - cy;

  const faceX = Math.max(-15, Math.min(15, dx / 20));
  const faceY = Math.max(-10, Math.min(10, dy / 30));

  if (!isLookingAtEachOther && !(passwordInput.value && !showPassword)) {
    charPurple.style.transform = `skewX(${-dx/120}deg)`;
    charBlack.style.transform = `skewX(${-dx/120}deg)`;
    charOrange.style.transform = `skewX(${-dx/120}deg)`;
    charYellow.style.transform = `skewX(${-dx/120}deg)`;

    purpleEyes.style.left = `${45 + faceX}px`;
    purpleEyes.style.top = `${40 + faceY}px`;
    blackEyes.style.left = `${26 + faceX}px`;
    blackEyes.style.top = `${32 + faceY}px`;
    orangeEyes.style.left = `${82 + faceX}px`;
    orangeEyes.style.top = `${90 + faceY}px`;
    yellowEyes.style.left = `${52 + faceX}px`;
    yellowEyes.style.top = `${40 + faceY}px`;
    yellowMouth.style.left = `${40 + faceX}px`;
    yellowMouth.style.top = `${88 + faceY}px`;
  }
  requestAnimationFrame(animateBodyLean);
}
animateBodyLean();

// ===== 眨眼 =====
function scheduleBlink(charEl, flag) {
  const delay = Math.random() * 4000 + 3000;
  setTimeout(() => {
    if (flag()) return; // 被阻止
    charEl.classList.add('blinking');
    setTimeout(() => {
      charEl.classList.remove('blinking');
      scheduleBlink(charEl, flag);
    }, 150);
  }, delay);
}
scheduleBlink(charPurple, () => purpleBlinking);
scheduleBlink(charBlack, () => blackBlinking);

// ===== 打字检测 =====
function onTypingStart() {
  if (isTyping) return;
  isTyping = true;
  isLookingAtEachOther = true;

  // 紫色伸长 + 互相看
  charPurple.classList.add('looking-each');
  charBlack.classList.add('looking-each');
  mascotArea.classList.add('looking-each');

  // 强制瞳孔方向：紫色和黑色互相看
  setForceLook(charPurple, 3, 4);
  setForceLook(charBlack, -3, 4);
}

function onTypingEnd() {
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    isTyping = false;
    isLookingAtEachOther = false;
    charPurple.classList.remove('looking-each');
    charBlack.classList.remove('looking-each');
    mascotArea.classList.remove('looking-each');
    clearForceLook(charPurple);
    clearForceLook(charBlack);
  }, 800);
}

function setForceLook(charEl, x, y) {
  charEl.querySelectorAll('.pupil').forEach(p => {
    p.style.transform = `translate(${x}px, ${y}px)`;
  });
}
function clearForceLook(charEl) {
  charEl.querySelectorAll('.pupil').forEach(p => {
    p.style.transform = '';
  });
}

[loginInput, usernameInput, emailInput].forEach(el => {
  el.addEventListener('focus', onTypingStart);
  el.addEventListener('blur', onTypingEnd);
  el.addEventListener('input', () => { onTypingStart(); onTypingEnd(); });
});

// ===== 密码可见时紫色偷看 =====
function updatePasswordState() {
  const hasPwd = passwordInput.value.length > 0;
  if (hasPwd && showPassword) {
    mascotArea.classList.add('pwd-visible');
    // 紫色偷看密码
    setForceLook(charPurple, -4, -4);
    setForceLook(charBlack, -4, -4);
    setForceLook(charOrange, -5, -4);
    setForceLook(charYellow, -5, -4);
    schedulePurplePeek();
  } else if (hasPwd && !showPassword) {
    mascotArea.classList.remove('pwd-visible');
    // 打字状态已处理
    clearForceLook(charPurple);
    clearForceLook(charBlack);
    clearForceLook(charOrange);
    clearForceLook(charYellow);
    clearTimeout(peekTimer);
  } else {
    mascotArea.classList.remove('pwd-visible');
    clearForceLook(charPurple);
    clearForceLook(charBlack);
    clearForceLook(charOrange);
    clearForceLook(charYellow);
    clearTimeout(peekTimer);
  }
}

function schedulePurplePeek() {
  clearTimeout(peekTimer);
  if (!showPassword || !passwordInput.value) return;
  const delay = Math.random() * 3000 + 2000;
  peekTimer = setTimeout(() => {
    // 紫色快速偷看
    setForceLook(charPurple, 4, 5); // 眼珠转向密码方向
    setTimeout(() => {
      setForceLook(charPurple, -4, -4); // 恢复
      schedulePurplePeek();
    }, 800);
  }, delay);
}

passwordInput.addEventListener('input', () => {
  onTypingStart();
  onTypingEnd();
  updatePasswordState();
});

togglePwd.addEventListener('click', () => {
  showPassword = !showPassword;
  passwordInput.type = showPassword ? 'text' : 'password';
  togglePwd.textContent = showPassword ? '🙈' : '👁';
  updatePasswordState();
});

// ===== 模式切换 =====
function setMode(m) {
  mode = m;
  if (m === 'login') {
    formTitle.textContent = '欢迎回来';
    formSubtitle.textContent = '登录你的咖啡大师账号';
    submitBtn.textContent = '登 录';
    switchText.textContent = '还没有账号？';
    switchBtn.textContent = '立即注册';
    loginField.style.display = 'block';
    regUserGroup.style.display = 'none';
    regEmailGroup.style.display = 'none';
    confirmGroup.style.display = 'none';
    usernameInput.value = '';
    emailInput.value = '';
    confirmInput.value = '';
  } else {
    formTitle.textContent = '创建账号';
    formSubtitle.textContent = '加入咖啡大师，探索咖啡世界';
    submitBtn.textContent = '注 册';
    switchText.textContent = '已有账号？';
    switchBtn.textContent = '去登录';
    loginField.style.display = 'none';
    regUserGroup.style.display = 'block';
    regEmailGroup.style.display = 'block';
    confirmGroup.style.display = 'block';
    loginInput.value = '';
  }
  clearErrors();
  showPassword = false;
  passwordInput.type = 'password';
  togglePwd.textContent = '👁';
  mascotArea.classList.remove('pwd-visible');
  updatePasswordState();
}
switchBtn.addEventListener('click', () => setMode(mode === 'login' ? 'register' : 'login'));

function clearErrors() {
  ['loginError','emailError','usernameError','passwordError','confirmError'].forEach(id => document.getElementById(id).textContent = '');
  [loginInput, emailInput, usernameInput, passwordInput, confirmInput].forEach(el => el.classList.remove('error'));
}
function showFieldError(fid, eid, msg) {
  document.getElementById(fid).classList.add('error');
  document.getElementById(eid).textContent = msg;
}
function shakeAll() {
  [charPurple, charBlack, charOrange, charYellow].forEach(c => {
    c.classList.add('shake');
    setTimeout(() => c.classList.remove('shake'), 500);
  });
}
function toast(msg, type) {
  const old = document.querySelector('.toast'); if (old) old.remove();
  const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

// ===== 提交 =====
submitBtn.addEventListener('click', () => {
  const loginVal = loginInput.value.trim();
  const email = emailInput.value.trim();
  const username = usernameInput.value.trim();
  const password = passwordInput.value;
  const confirm = confirmInput.value;
  clearErrors();
  let valid = true;
  if (mode === 'login') {
    if (!loginVal) { showFieldError('loginInput','loginError','请输入用户名或邮箱'); valid = false; }
  } else {
    if (!username || username.length < 2) { showFieldError('usernameInput','usernameError','用户名至少2个字符'); valid = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('emailInput','emailError','请输入有效的邮箱地址'); valid = false; }
  }
  if (!password || password.length < 4) { showFieldError('passwordInput','passwordError','密码至少4个字符'); valid = false; }
  if (mode === 'register' && password !== confirm) { showFieldError('confirmInput','confirmError','两次密码不一致'); valid = false; }
  if (!valid) { shakeAll(); return; }

  submitBtn.disabled = true;
  mascotArea.classList.add('submitting');

  const endpoint = mode === 'login' ? '/api/login' : '/api/register';
  const body = mode === 'login'
    ? JSON.stringify({ username: loginVal, password })
    : JSON.stringify({ email, username, password });

  fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body })
    .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
    .then(({ ok, data }) => {
      if (!ok) { toast(data.error || '请求失败','error'); shakeAll(); mascotArea.classList.remove('submitting'); submitBtn.disabled = false; return; }
      toast(mode === 'register' ? '注册成功！跳转中...' : '登录成功！跳转中...', 'success');
      setTimeout(() => { window.location.href = '/'; }, 600);
    })
    .catch(() => { toast('网络错误','error'); shakeAll(); mascotArea.classList.remove('submitting'); submitBtn.disabled = false; });
});

document.addEventListener('keydown', e => { if (e.key==='Enter' && document.activeElement?.tagName==='INPUT') submitBtn.click(); });
setMode('login');
</script>
</body>
</html>
